<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grace's Kitchen</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <!-- Header -->
  <header class="p-6 bg-orange-600 text-white flex justify-between items-center">

<div>
<h1 id="homeBtn" class="text-3xl font-bold cursor-pointer">
Grace's Kitchen
</h1>
<p class="text-sm">Lasting Taste</p>
</div>

<button
id="favoritesView"
class="bg-white text-orange-600 px-4 py-2 rounded font-semibold hover:bg-orange-100">
❤️ Favorites
</button>

</header>

    <!-- Loader -->
    <div id="loader" class="text-center py-10 hidden">
      <p class="animate-pulse text-orange-600">Loading foods...</p>
    </div>

    <section class="relative h-64 w-full overflow-hidden">

<img
src="https://images.unsplash.com/photo-1504674900247-0877df9cc836"
alt="Food banner"
class="w-full h-full object-cover"
/>

<div class="absolute inset-0 bg-black/40 flex items-center justify-center">

<div class="text-center text-white px-4">

<h2 class="text-4xl font-bold mb-2">
Discover Delicious Foods
</h2>

<p class="text-lg">
Explore Nigerian and global dishes from Grace's Kitchen
</p>

</div>

</div>

</section>
    <!-- Filters & Search -->
    <main class="p-6">
      <div class="bg-white p-4 rounded-xl shadow flex flex-wrap gap-4 mb-6">
        <input
          id="searchInput"
          type="text"
          placeholder="Search foods..."
          class="border rounded-lg p-2 flex-1 min-w-[150px]"
        />
<h2 class="text-2xl font-bold mb-4 text-gray-800">
Available Foods
</h2>
        <select id="categoryFilter" class="border rounded-lg p-2">
          <option value="">All Categories</option>
        </select>

        <select id="regionFilter" class="border rounded-lg p-2">
          <option value="">All Regions</option>
        </select>

        <label><input type="checkbox" id="vegFilter" /> Vegetarian</label>
        <label><input type="checkbox" id="spicyFilter" /> Spicy</label>

        <button id="clearFilters" class="bg-gray-300 px-3 py-1 rounded">
          Clear Filters
        </button>

        <button
          id="clearFavorites"
          class="bg-red-500 text-white px-3 py-1 rounded"
        >
          Clear Favorites
        </button>
      </div>

      <!-- Grid -->
      <div id="foodsGrid" class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>
    <!-- Food Detail Modal -->
    <div
      id="foodModal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50"
    >
      <div class="bg-white rounded-xl w-11/12 max-w-lg p-6 relative">
        <button
          id="closeModal"
          class="absolute top-3 right-3 text-gray-500 hover:text-gray-800 text-xl font-bold"
        >
          &times;
        </button>

        <div id="modalContent" class="space-y-3">
          <!-- Dynamic content goes here -->
        </div>
      </div>
    </div>
    <div
      id="toast"
      class="fixed top-6 left-1/2 -translate-x-1/2 bg-orange-100 text-orange-700 px-6 py-3 rounded-lg shadow-lg font-medium opacity-0 transition duration-300"
    ></div>
    <script src="script.js"></script>
  </body>
</html>
