<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<title>MealNest - Discover Nigerian Dishes</title>

<style>
/* Floating kitchen utensils */
.bg-utensil {
  position: absolute;
  width: 80px;
  opacity: 0.08;
  animation: float linear infinite;
}

/* Card hover */
.food-card {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.food-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* Favorite icon animation */
.favorite-btn {
  transition: transform 0.2s ease, fill 0.2s ease;
}
.favorite-btn:hover {
  transform: scale(1.3);
}

/* Modal image hover zoom */
.modal-img {
  transition: transform 0.3s ease;
}
.modal-img:hover {
  transform: scale(1.05);
}
</style>
</head>

<body class="bg-gradient-to-b from-orange-50 via-white to-orange-50 relative overflow-x-hidden">

<!-- Floating kitchen utensils -->
<img src="https://img.icons8.com/color/96/kitchen-utensils.png" class="bg-utensil utensil">
<img src="https://img.icons8.com/color/96/cooking-pot.png" class="bg-utensil utensil">
<img src="https://img.icons8.com/color/96/frying-pan.png" class="bg-utensil utensil">

<!-- Navbar -->
<header class="sticky top-0 z-50 border-b border-orange-100/70 bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500 shadow-lg shadow-orange-200/70 backdrop-blur supports-[backdrop-filter]:bg-orange-500/90">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col gap-3 py-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center justify-between gap-3 sm:justify-start">
        <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-white">MealNest</h1>
        <span class="hidden sm:inline-block h-6 w-px bg-white/40"></span>
        <p class="text-sm sm:text-base font-medium text-orange-50/95">Discover Nigerian Dishes</p>
      </div>
      <button id="favoritesBtn" class="w-full sm:w-auto rounded-xl border border-white/40 bg-white/20 px-5 py-2.5 text-sm font-semibold text-white shadow-md shadow-orange-800/20 transition duration-200 hover:-translate-y-0.5 hover:bg-white/30 hover:shadow-lg focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-orange-500">
        Favorites
      </button>
    </div>
  </div>
</header>

<!-- Filters -->
<section class="mx-auto mt-4 max-w-7xl px-4 sm:px-6 lg:px-8">
  <div class="rounded-2xl border border-orange-100 bg-white/95 p-4 shadow-sm shadow-orange-100/70 backdrop-blur-sm sm:p-5 lg:p-6">
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-12 lg:gap-4 items-center">
      <input id="searchInput" placeholder="Search food..."
        class="lg:col-span-4 h-11 w-full rounded-xl border border-gray-200 bg-white px-4 text-sm text-gray-800 placeholder:text-gray-400 shadow-sm transition duration-200 hover:border-orange-300 focus:border-orange-400 focus:outline-none focus:ring-4 focus:ring-orange-100">

        <select id="categoryFilter" class="lg:col-span-2 h-11 w-full rounded-xl border border-gray-200 bg-white px-3 text-sm text-gray-700 shadow-sm transition duration-200 hover:border-orange-300 focus:border-orange-400 focus:outline-none focus:ring-4 focus:ring-orange-100">
    <option value="">All Categories</option>
  </select>

  <select id="regionFilter" class="lg:col-span-2 h-11 w-full rounded-xl border border-gray-200 bg-white px-3 text-sm text-gray-700 shadow-sm transition duration-200 hover:border-orange-300 focus:border-orange-400 focus:outline-none focus:ring-4 focus:ring-orange-100">
    <option value="">All Regions</option>
  </select>

  <label class="lg:col-span-2 h-11 rounded-xl border border-gray-200 bg-orange-50/50 px-3 text-sm text-gray-700 shadow-sm transition duration-200 hover:border-orange-300 hover:bg-orange-50 cursor-pointer flex items-center justify-center sm:justify-start gap-2 whitespace-nowrap">
  <input type="checkbox" id="vegFilter" class="h-4 w-4 rounded accent-orange-500 shrink-0">
  <span>Vegetarian</span>
</label>

<label class="lg:col-span-2 h-11 rounded-xl border border-gray-200 bg-orange-50/50 px-3 text-sm text-gray-700 shadow-sm transition duration-200 hover:border-orange-300 hover:bg-orange-50 cursor-pointer flex items-center justify-center sm:justify-start gap-2 whitespace-nowrap">
  <input type="checkbox" id="spicyFilter" class="h-4 w-4 rounded accent-orange-500 shrink-0">
  <span>Spicy</span>
</label>

  <button id="clearFilters" class="lg:col-span-2 h-11 w-full rounded-xl bg-gradient-to-r from-orange-500 to-amber-500 px-4 text-sm font-semibold text-white shadow-md shadow-orange-200 transition duration-200 hover:-translate-y-0.5 hover:from-orange-600 hover:to-amber-600 hover:shadow-lg focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-orange-500 focus-visible:ring-offset-2">
    Clear Filters
  </button>
</div>
  </div>
</section>

<!-- Food grid -->
<main class="max-w-7xl mx-auto p-6">
  <div id="foodGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
</main>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
  <div class="bg-white p-6 rounded-lg w-full max-w-lg relative shadow-2xl">
    <button id="closeModal" class="absolute top-3 right-4 text-xl text-gray-600 hover:text-orange-500 transition">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed top-5 left-1/2 -translate-x-1/2
bg-orange-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-all duration-300">
</div>

<script src="script.js"></script>
</body>
</html>
